name: CI/CD Audit + Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:

  audit:
    name: Self-Audit Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install cicd-audit-framework
        run: pip install -e .

      - name: Run audit on this repo
        run: |
          cicd-audit run . \
            --output audit-report.html \
            --json \
            --fail-below 70

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: audit-report-${{ github.sha }}
          path: |
            audit-report.html
            audit-report.json
          retention-days: 30

      - name: Print JSON summary to logs
        if: always()
        run: |
          if [ -f audit-report.json ]; then
            echo "=== Audit Summary ==="
            python - <<'EOF'
          import json, sys
          with open("audit-report.json") as f:
              d = json.load(f)
          print(f"Score : {d['score']}/100  ({d['grade']} – {d['grade_label']})")
          print(f"Issues: {d['summary']['total']} total "
                f"({d['summary']['critical']} critical, "
                f"{d['summary']['high']} high, "
                f"{d['summary']['medium']} medium, "
                f"{d['summary']['low']} low)")
          EOF
          fi

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=cicd_auditor \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Run linter
        run: ruff check cicd_auditor/
